# ============================================================
#  🤖 Uptime Keeper — Multi-Service Ping Workflow
# ============================================================
#  Pings all free-tier services every 10 minutes to prevent
#  auto-sleep. URLs stored as GitHub Secrets.
#
#  Secrets needed:
#    RENDER_URL    — Render backend URL
#    HF_SPACE_URL  — HuggingFace Space URL
# ============================================================

name: "🤖 Uptime Keeper"

on:
  # ── Scheduled: every 10 minutes ──
  schedule:
    - cron: "*/10 * * * *"

  # ── Manual trigger ──
  workflow_dispatch:

permissions:
  contents: read

jobs:
  keep-alive:
    name: "🏓 Ping All Services"
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set Up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      - name: 📦 Install Dependencies
        run: pip install -r requirements.txt

      - name: 🚀 Ping Services
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
          HF_SPACE_URL: ${{ secrets.HF_SPACE_URL }}
        run: python main.py


